quarkus.application.name=image-service
quarkus.http.port=8083

# PostgreSQL
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:postgres}
quarkus.datasource.password=${DB_PASSWORD:postgres}
quarkus.datasource.reactive.url=postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/${DB_NAME:image_db}
quarkus.datasource.jdbc.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/${DB_NAME:image_db}

# Liquibase
quarkus.liquibase.migrate-at-start=true
quarkus.liquibase.change-log=db/changelog/db.changelog-master.xml
quarkus.hibernate-orm.database.generation=none

# gRPC server - runs on same port as HTTP (8083)
quarkus.grpc.server.use-separate-server=false

# Kafka consumer
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP:localhost:29092}
mp.messaging.incoming.incident-events.connector=smallrye-kafka
mp.messaging.incoming.incident-events.topic=incident-events
mp.messaging.incoming.incident-events.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.incident-events.auto.offset.reset=earliest
mp.messaging.incoming.incident-events.group.id=image-service

# MinIO
minio.url=${MINIO_URL:http://localhost:9000}
minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
minio.secret-key=${MINIO_SECRET_KEY:minioadmin}
minio.bucket=${MINIO_BUCKET:incident-images}
