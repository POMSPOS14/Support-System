quarkus.application.name=notification-service
quarkus.http.port=8084

# Kafka
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP:localhost:29092}
mp.messaging.incoming.incident-events.connector=smallrye-kafka
mp.messaging.incoming.incident-events.topic=incident-events
mp.messaging.incoming.incident-events.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.incident-events.auto.offset.reset=earliest

# gRPC client -> user-service (use-separate-server=false, gRPC runs on HTTP port 8082)
quarkus.grpc.clients.user-service.host=${USER_SERVICE_HOST:localhost}
quarkus.grpc.clients.user-service.port=${USER_SERVICE_GRPC_PORT:8082}

# Mailer (SMTP)
quarkus.mailer.host=${MAIL_HOST:smtp.gmail.com}
quarkus.mailer.port=${MAIL_PORT:587}
quarkus.mailer.start-tls=REQUIRED
quarkus.mailer.username=${MAIL_USERNAME:noreply@company.com}
quarkus.mailer.password=${MAIL_PASSWORD:changeme}
quarkus.mailer.from=${MAIL_FROM:noreply@company.com}

# Mock mailer ? ?????? ?? ????????????, ????? ?????? ? ?????.
# ????? ???????? ???????? ????????, ?????????? MAIL_MOCK=false
quarkus.mailer.mock=${MAIL_MOCK:true}

# Swagger
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

# gRPC server - disable separate server (notification-service is gRPC client only)
quarkus.grpc.server.use-separate-server=false