# Отключаем Liquibase в тестах
quarkus.liquibase.migrate-at-start=false

# In-memory H2 вместо PostgreSQL для тестов
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
quarkus.datasource.username=sa
quarkus.datasource.password=

# Reactive datasource (Hibernate Reactive требует)
quarkus.datasource.reactive.url=h2:mem:testdb

# Отключаем OIDC
quarkus.oidc.enabled=false
quarkus.http.auth.proactive=false

# Hibernate — создаём схему сами (без Liquibase)
quarkus.hibernate-orm.database.generation=drop-and-create

# Отключаем gRPC клиентов
quarkus.grpc.clients.user-service.host=localhost
quarkus.grpc.clients.user-service.port=19001
quarkus.grpc.clients.image-service.host=localhost
quarkus.grpc.clients.image-service.port=19002
